name: Monthly GA4 Report

on:
  schedule:
    # 11:00 KST on the 26th day of every month (02:00 UTC)
    - cron: "0 2 26 * *"
  workflow_dispatch:
    inputs:
      start:
        description: "Start date (YYYYMMDD). Leave blank to auto-calc."
        required: false
      end:
        description: "End date (YYYYMMDD). Leave blank to auto-calc."
        required: false
      report_month:
        description: "Report month (YYYYMM). Leave blank to auto-calc."
        required: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    env:
      CLIENT_NAME: ${{ vars.CLIENT_NAME }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GA4 service account key
        shell: bash
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/ga4-service-account.json"
          printf '%s' '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > "$KEY_PATH"
          echo "GOOGLE_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Resolve report dates
        id: dates
        shell: bash
        run: |
          set -euo pipefail
          START_IN="${{ github.event.inputs.start }}"
          END_IN="${{ github.event.inputs.end }}"
          REPORT_MONTH_IN="${{ github.event.inputs.report_month }}"

          if [[ -n "$START_IN" && -n "$END_IN" ]]; then
            START="$START_IN"
            END="$END_IN"
            if [[ -n "$REPORT_MONTH_IN" ]]; then
              REPORT_MONTH="$REPORT_MONTH_IN"
            else
              REPORT_MONTH="${END:0:6}"
            fi
          else
            python -c "from datetime import datetime; from zoneinfo import ZoneInfo; now = datetime.now(ZoneInfo('Asia/Seoul')); this_month_24 = now.replace(day=24); end_dt = this_month_24 if now.day >= 25 else this_month_24.replace(year=this_month_24.year + ((this_month_24.month - 2) // 12), month=((this_month_24.month - 2) % 12) + 1); prev_month = end_dt.replace(year=end_dt.year + ((end_dt.month - 2) // 12), month=((end_dt.month - 2) % 12) + 1); start_dt = prev_month.replace(day=25); print(f'START={start_dt:%Y%m%d}'); print(f'END={end_dt:%Y%m%d}'); print(f'REPORT_MONTH={end_dt:%Y%m}')" > "$RUNNER_TEMP/dates.env"
            source "$RUNNER_TEMP/dates.env"
          fi

          echo "START=$START" >> "$GITHUB_ENV"
          echo "END=$END" >> "$GITHUB_ENV"
          echo "REPORT_MONTH=$REPORT_MONTH" >> "$GITHUB_ENV"
          PREV_REPORT_MONTH="$(python -c "from datetime import datetime; dt=datetime.strptime('$REPORT_MONTH','%Y%m'); prev_year=dt.year-1 if dt.month==1 else dt.year; prev_month=12 if dt.month==1 else dt.month-1; print(f'{prev_year}{prev_month:02d}')")"
          echo "PREV_REPORT_MONTH=$PREV_REPORT_MONTH" >> "$GITHUB_ENV"

          echo "start=$START" >> "$GITHUB_OUTPUT"
          echo "end=$END" >> "$GITHUB_OUTPUT"
          echo "report_month=$REPORT_MONTH" >> "$GITHUB_OUTPUT"
          echo "prev_report_month=$PREV_REPORT_MONTH" >> "$GITHUB_OUTPUT"

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          python --version
          if [[ -z "${CLIENT_NAME:-}" ]]; then
            echo "CLIENT_NAME GitHub variable is not set."
            exit 1
          fi
          if [[ -z "${START:-}" || -z "${END:-}" || -z "${REPORT_MONTH:-}" ]]; then
            echo "Resolved dates are missing. START='${START:-}' END='${END:-}' REPORT_MONTH='${REPORT_MONTH:-}'"
            exit 1
          fi
          echo "Resolved values: CLIENT_NAME='$CLIENT_NAME' START='$START' END='$END' REPORT_MONTH='$REPORT_MONTH'"

      - name: Restore previous summary artifact (best effort)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ARTIFACT_NAME="monthly-summary-${CLIENT_NAME}-${PREV_REPORT_MONTH}"
          DOWNLOAD_URL="$(python -c "import json,os,urllib.request; repo=os.environ['GITHUB_REPOSITORY']; token=os.environ['GITHUB_TOKEN']; name=os.environ['ARTIFACT_NAME']; req=urllib.request.Request(f'https://api.github.com/repos/{repo}/actions/artifacts?per_page=100', headers={'Authorization':f'Bearer {token}','Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}); data=json.load(urllib.request.urlopen(req)); arts=[a for a in data.get('artifacts', []) if a.get('name') == name and not a.get('expired', False)]; arts.sort(key=lambda a: a.get('created_at', ''), reverse=True); print(arts[0].get('archive_download_url', '') if arts else '')")"
          if [[ -z "$DOWNLOAD_URL" ]]; then
            echo "No previous summary artifact found for '$ARTIFACT_NAME'."
            exit 0
          fi

          mkdir -p "output/$CLIENT_NAME"
          mkdir -p "$RUNNER_TEMP/prev-summary"
          curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -o "$RUNNER_TEMP/previous-summary.zip" \
            "$DOWNLOAD_URL"
          unzip -o "$RUNNER_TEMP/previous-summary.zip" -d "$RUNNER_TEMP/prev-summary" >/dev/null
          FOUND_SUMMARY="$(find "$RUNNER_TEMP/prev-summary" -type f -name "*_${PREV_REPORT_MONTH}_summary.json" | head -n 1 || true)"
          if [[ -z "$FOUND_SUMMARY" ]]; then
            echo "Artifact downloaded but previous summary JSON was not found."
            exit 0
          fi
          cp "$FOUND_SUMMARY" "output/$CLIENT_NAME/"
          echo "Restored previous summary artifact: $ARTIFACT_NAME -> $(basename "$FOUND_SUMMARY")"

      - name: Generate report
        shell: bash
        run: |
          set -euo pipefail
          python main.py \
            --client "$CLIENT_NAME" \
            --start "$START" \
            --end "$END" \
            --report-month "$REPORT_MONTH"

      - name: Upload PPT artifact
        uses: actions/upload-artifact@v4
        with:
          name: monthly-ppt-${{ steps.dates.outputs.report_month }}
          path: output/${{ env.CLIENT_NAME }}/${{ env.CLIENT_NAME }}_${{ steps.dates.outputs.report_month }}_report.pptx
          if-no-files-found: error

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: monthly-summary-${{ env.CLIENT_NAME }}-${{ steps.dates.outputs.report_month }}
          path: output/${{ env.CLIENT_NAME }}/${{ env.CLIENT_NAME }}_${{ steps.dates.outputs.report_month }}_summary.json
          if-no-files-found: error
