name: Monthly GA4 Report

on:
  schedule:
    # 11:00 KST on the 26th day of every month (02:00 UTC)
    - cron: "0 2 26 * *"
  workflow_dispatch:
    inputs:
      start:
        description: "Start date (YYYYMMDD). Leave blank to auto-calc."
        required: false
      end:
        description: "End date (YYYYMMDD). Leave blank to auto-calc."
        required: false
      report_month:
        description: "Report month (YYYYMM). Leave blank to auto-calc."
        required: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    env:
      CLIENT_NAME: ${{ vars.CLIENT_NAME }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GA4 service account key
        shell: bash
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/ga4-service-account.json"
          printf '%s' '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > "$KEY_PATH"
          echo "GOOGLE_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Resolve report dates
        id: dates
        shell: bash
        run: |
          set -euo pipefail
          START_IN="${{ github.event.inputs.start }}"
          END_IN="${{ github.event.inputs.end }}"
          REPORT_MONTH_IN="${{ github.event.inputs.report_month }}"

          if [[ -n "$START_IN" && -n "$END_IN" ]]; then
            START="$START_IN"
            END="$END_IN"
            if [[ -n "$REPORT_MONTH_IN" ]]; then
              REPORT_MONTH="$REPORT_MONTH_IN"
            else
              REPORT_MONTH="${END:0:6}"
            fi
          else
            python -c "from datetime import datetime; from zoneinfo import ZoneInfo; now = datetime.now(ZoneInfo('Asia/Seoul')); this_month_24 = now.replace(day=24); end_dt = this_month_24 if now.day >= 25 else this_month_24.replace(year=this_month_24.year + ((this_month_24.month - 2) // 12), month=((this_month_24.month - 2) % 12) + 1); prev_month = end_dt.replace(year=end_dt.year + ((end_dt.month - 2) // 12), month=((end_dt.month - 2) % 12) + 1); start_dt = prev_month.replace(day=25); print(f'START={start_dt:%Y%m%d}'); print(f'END={end_dt:%Y%m%d}'); print(f'REPORT_MONTH={end_dt:%Y%m}')" > "$RUNNER_TEMP/dates.env"
            source "$RUNNER_TEMP/dates.env"
          fi

          echo "START=$START" >> "$GITHUB_ENV"
          echo "END=$END" >> "$GITHUB_ENV"
          echo "REPORT_MONTH=$REPORT_MONTH" >> "$GITHUB_ENV"

          echo "start=$START" >> "$GITHUB_OUTPUT"
          echo "end=$END" >> "$GITHUB_OUTPUT"
          echo "report_month=$REPORT_MONTH" >> "$GITHUB_OUTPUT"

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          python --version
          if [[ -z "${CLIENT_NAME:-}" ]]; then
            echo "CLIENT_NAME GitHub variable is not set."
            exit 1
          fi
          if [[ -z "${START:-}" || -z "${END:-}" || -z "${REPORT_MONTH:-}" ]]; then
            echo "Resolved dates are missing. START='${START:-}' END='${END:-}' REPORT_MONTH='${REPORT_MONTH:-}'"
            exit 1
          fi
          echo "Resolved values: CLIENT_NAME='$CLIENT_NAME' START='$START' END='$END' REPORT_MONTH='$REPORT_MONTH'"

      - name: Generate report
        shell: bash
        run: |
          set -euo pipefail
          python main.py \
            --client "$CLIENT_NAME" \
            --start "$START" \
            --end "$END" \
            --report-month "$REPORT_MONTH"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monthly-report-${{ steps.dates.outputs.report_month }}
          path: output/**
          if-no-files-found: error
